<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Izwan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #ffffff; }

        /* HEADER */
        header {
            background: #161b22;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid #30363d;
        }
        header h1 { font-size: 2.5rem; color: #58a6ff; }
        header p { font-size: 1.1rem; color: #8b949e; margin-top: 10px; }

        /* ABOUT */
        .about {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }
        .about h2 { color: #58a6ff; margin-bottom: 15px; }
        .about p { color: #8b949e; line-height: 1.8; }

        /* SKILLS */
        .skills {
            background: #161b22;
            padding: 50px 20px;
            text-align: center;
        }
        .skills h2 { color: #58a6ff; margin-bottom: 25px; }
        .skill-list {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .skill-list span {
            background: #238636;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #8b949e;
            border-top: 1px solid #30363d;
            margin-top: 50px;
        }
        footer a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <h1>Muhammad Izwan</h1>
        <p>Student Developer | UiTM Kelantan</p>
    </header>

    <section class="about">
        <h2>About Me</h2>
        <p>Saya pelajar IT di UiTM Kelantan yang sedang belajar web development
        dan Git & GitHub. Saya berminat dalam teknologi dan sentiasa bersedia
        untuk belajar perkara baru.</p>
    </section>

    <section class="skills">
        <h2>Skills</h2>
        <div class="skill-list">
            <span>HTML</span>
            <span>CSS</span>
            <span>Git</span>
            <span>GitHub</span>
        </div>
    </section>

    <footer>
        <p>© 2026 Izwan | 
        <a href="https://github.com/izwan-codes" target="_blank">GitHub: izwan-codes</a>
        </p>
    </footer>

</body>
</html>
